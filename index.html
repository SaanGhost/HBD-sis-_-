<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لكِ! 🎁</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e; /* خلفية داكنة لتبرز المفاجأة */
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            cursor: pointer;
        }

        /* حاوية الصندوق */
        .gift-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.5s ease;
        }

        .gift-box {
            width: 150px;
            height: 150px;
            background: #e63946;
            position: relative;
            border-radius: 10px;
            animation: wobble 1s infinite;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* شريطة الصندوق */
        .gift-box::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background: #ffb703;
            left: 60px;
        }

        .gift-box::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 30px;
            background: #ffb703;
            top: 60px;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
        }

        /* رسالة التهنئة (مخفية في البداية) */
        .celebration-content {
            display: none;
            text-align: center;
            color: white;
            animation: zoomIn 1s forwards;
        }

        h1 { font-size: 3.5rem; margin-bottom: 0; color: #ffb703; }
        p { font-size: 1.5rem; opacity: 0.9; }

        @keyframes zoomIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* جزيئات الانفجار الاحتفالي */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="gift-container" id="giftSection" onclick="revealSurprise()">
        <div class="gift-box"></div>
        <h2 style="color: white; margin-top: 20px;">اضغطي لفتح المفاجأة! 😊</h2>
    </div>

    <div class="celebration-content" id="surpriseSection">
        <img src="/img/Celebrate Happy Birthday Sticker by Pusheen - Find & Share on GIPHY.gif"
         width="150" height="200">
        <h1>كُل عام وأنتِ بخير 🎉</h1>
        <p>كل عام وانتِ الفرح <br>
             كل عام وأيامك الجديدة تزهر بالسعادة <br>
             وتتفتّح فيها ورود الخير<br>
              عيد ميلاد سعيد اختي<br>
               وكل عام وانتِ أجمل من السابق.</p>
        <div style="font-size: 50px;">🎂 🎈 🎁 🌟</div>
        <p>اخوكي الطويل 😊</p>
    </div>

    <script>
        function revealSurprise() {
            // إخفاء الصندوق
            document.getElementById('giftSection').style.display = 'none';
            
            // إظهار المحتوى
            const surprise = document.getElementById('surpriseSection');
            surprise.style.display = 'block';
            document.body.style.background = 'radial-gradient(circle, #2b2d42, #000000)';

            // إطلاق التأثيرات الاحتفالية
            for (let i = 0; i < 150; i++) {
                createParticle();
            }
        }

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const colors = ['#ffb703', '#e63946', '#a8dadc', '#457b9d', '#ffffff', '#ff006e'];
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            const startX = window.innerWidth / 2;
            const startY = window.innerHeight / 2;
            
            particle.style.left = startX + 'px';
            particle.style.top = startY + 'px';
            
            document.body.appendChild(particle);

            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 10 + 5;
            const destinationX = (Math.cos(angle) * (Math.random() * 400));
            const destinationY = (Math.sin(angle) * (Math.random() * 400));

            const animation = particle.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(${destinationX}px, ${destinationY}px) scale(0)`, opacity: 0 }
            ], {
                duration: Math.random() * 1000 + 2000,
                easing: 'cubic-bezier(0, .9, .57, 1)'
            });

            animation.onfinish = () => particle.remove();
        }
    </script>
</body>

</html>
